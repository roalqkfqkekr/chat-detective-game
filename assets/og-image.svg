    <text x="80" y="240" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="96" font-weight="900" fill="#FFFFFF">톡탐정</text>
    <text x="84" y="312" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="46" font-weight="800" fill="#FFF1BD">대화 속 진실을 찾아라</text>
    <text x="86" y="376" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="30" font-weight="600" fill="#D7E2F2">단톡방 속 거짓말, 끝까지 읽어야 보인다.</text>
    <text x="86" y="430" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" fill="#9FB0C8">채팅 기록, 타임라인, 자료 메모를 뒤져 사건을 재구성하세요.</text>
  </g>
