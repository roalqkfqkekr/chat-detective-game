<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">톡탐정 SNS preview image</title>
  <desc id="desc">A custom open graph image for a messenger detective game.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="1112" y2="602" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset=".48" stop-color="#111C2E"/>
      <stop offset="1" stop-color="#241A34"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="80" x2="870" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD166"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="shadow" x="584" y="44" width="406" height="540" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M82 102h280M104 520h230M880 88h210M908 532h178" stroke="#5EEAD4" stroke-opacity=".18" stroke-width="8" stroke-linecap="round"/>
